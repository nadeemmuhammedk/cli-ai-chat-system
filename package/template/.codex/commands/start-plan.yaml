description: Initiate planning mode for complex, multi-phase work

prompt: |
  Start a new planning cycle in the current active session.

  **Plan name:** $ARGS

  ## Step 1: Validate Active Session

  ```bash
  ACTIVE_FILE=".cli-ai-chat/active-session.txt"
  if [ ! -f "$ACTIVE_FILE" ]; then
    echo "ERROR: No active session found"
    echo "Run /new-session or /continue-session first"
    exit 1
  fi
  SESSION_PATH=$(cat "$ACTIVE_FILE")
  [ ! -d "$SESSION_PATH" ] && echo "ERROR: Session directory not found: $SESSION_PATH" && exit 1
  echo "Active session: $SESSION_PATH"
  ```

  ## Step 2: Validate Plan Name

  If $ARGS is empty, ask the user for a descriptive kebab-case plan name
  (e.g., "api-refactoring", "feature-implementation").

  ## Step 3: Archive Existing Planning Files (if any)

  ```bash
  PLANNING_DIR="$SESSION_PATH/planning_mode"
  TIMESTAMP=$(date +%Y-%m-%d-%H%M)
  mkdir -p "$PLANNING_DIR"

  if ls "$PLANNING_DIR"/*.md 2>/dev/null | grep -v "^$PLANNING_DIR/archive" | grep -q .; then
    mkdir -p "$PLANNING_DIR/archive"
    for file in "$PLANNING_DIR"/*.md; do
      if [ -f "$file" ] && [[ ! "$file" =~ archive ]]; then
        archived_name="archived-$TIMESTAMP-$(basename "$file")"
        mv "$file" "$PLANNING_DIR/archive/$archived_name"
        echo "Archived: $(basename "$file") → $archived_name"
      fi
    done
    echo "Old planning cycle archived"
  fi
  ```

  ## Step 4: Create Planning Files

  ```bash
  PLAN_NAME="[validated-plan-name]"
  CURRENT_DATE=$(date +%Y-%m-%d)
  CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
  PLANNING_DIR="$SESSION_PATH/planning_mode"

  # plan.md
  PLAN_FILE="$PLANNING_DIR/$CURRENT_DATE-$PLAN_NAME-plan.md"
  cat > "$PLAN_FILE" <<'PLAN_EOF'
  # Planning Document: PLAN_NAME_PLACEHOLDER

  ## Created
  DATETIME_PLACEHOLDER

  ## Overview
  [Brief description of what this planning cycle aims to accomplish]

  ## Goals
  1. [Primary goal]
  2. [Secondary goal]

  ## Approach
  [High-level methodology and strategy]

  ## Phases

  ### Phase 1: [Phase Name]
  **Objective:** [What this phase accomplishes]
  **Tasks:** See todo.md
  **Dependencies:** [What must be done first, or "None"]
  **Success Criteria:** [How we know this phase is complete]

  ### Phase 2: [Phase Name]
  **Objective:**
  **Tasks:** See todo.md
  **Dependencies:**
  **Success Criteria:**

  ## Constraints
  - [Technical constraints]
  - [Resource constraints]

  ## Risks
  - [Risk 1]: [Mitigation]
  - [Risk 2]: [Mitigation]

  ## Notes
  [Additional context or assumptions]

  ---
  *Last Updated: DATETIME_PLACEHOLDER*
  PLAN_EOF
  sed -i "s/PLAN_NAME_PLACEHOLDER/$PLAN_NAME/g" "$PLAN_FILE"
  sed -i "s/DATETIME_PLACEHOLDER/$CURRENT_DATETIME/g" "$PLAN_FILE"

  # todo.md
  TODO_FILE="$PLANNING_DIR/$CURRENT_DATE-$PLAN_NAME-todo.md"
  cat > "$TODO_FILE" <<'TODO_EOF'
  # Task List: PLAN_NAME_PLACEHOLDER

  ## Created
  DATETIME_PLACEHOLDER

  ## Phase 1: [Phase Name]
  1. [ ] Task description
  2. [ ] Task description

  ## Phase 2: [Phase Name]
  3. [ ] Task description
  4. [ ] Task description

  ---
  *Last Updated: DATETIME_PLACEHOLDER*
  *Tasks Remaining: [Count unchecked items]*
  TODO_EOF
  sed -i "s/PLAN_NAME_PLACEHOLDER/$PLAN_NAME/g" "$TODO_FILE"
  sed -i "s/DATETIME_PLACEHOLDER/$CURRENT_DATETIME/g" "$TODO_FILE"

  # done.md
  DONE_FILE="$PLANNING_DIR/$CURRENT_DATE-$PLAN_NAME-done.md"
  cat > "$DONE_FILE" <<'DONE_EOF'
  # Completed Tasks: PLAN_NAME_PLACEHOLDER

  ## Created
  DATETIME_PLACEHOLDER

  ## Completions

  (Tasks will be added here as they are completed from todo.md)

  ---
  *Last Updated: DATETIME_PLACEHOLDER*
  *Total Completed: 0*
  DONE_EOF
  sed -i "s/PLAN_NAME_PLACEHOLDER/$PLAN_NAME/g" "$DONE_FILE"
  sed -i "s/DATETIME_PLACEHOLDER/$CURRENT_DATETIME/g" "$DONE_FILE"

  echo "✓ Planning mode activated: $PLAN_NAME"
  echo "Files: plan.md, todo.md, done.md"
  ```

  ## Step 5: Confirm and Explain Behaviors

  Display:
  ```
  ✓ Planning mode activated: [plan-name]

  Files created in planning_mode/:
    - [date]-[name]-plan.md
    - [date]-[name]-todo.md
    - [date]-[name]-done.md

  Next steps:
    1. Fill in plan.md with goals, approach, and phases
    2. Break down tasks in todo.md by phase
    3. I will automatically:
       - Reference plan.md before major work
       - Update todo.md as tasks progress
       - Move completed tasks to done.md
       - Alert you if work deviates from the plan
  ```
