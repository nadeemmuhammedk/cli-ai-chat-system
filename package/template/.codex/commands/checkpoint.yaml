description: Save a checkpoint of the current session's progress

prompt: |
  Create a checkpoint for the active session.

  ## Step 1: Read Active Session

  Read `.cli-ai-chat/active-session.txt` to get the current session path.
  If file doesn't exist, tell the user to run /new-session first.

  ## Step 2: Check Planning Mode

  Look in `[session-path]/planning-mode/` for plan/todo/done files.
  If found, planning mode is active.

  ## Step 3: Analyze and Generate Checkpoint Content

  a. Review conversation history since last checkpoint:
     - Identify key topics discussed
     - Note work completed and artifacts created
     - Detect decision points and choices made
     - Observe context evolution (scope changes, new capabilities)

  b. Generate draft content:
     - Summary: concise description of work done
     - Decisions: choices made with rationale
     - Context changes: new capabilities or scope shifts

  c. **STOP: Present numbered selection to user and WAIT for response:**
  ```
  📋 Checkpoint Content

  Select accurate items (comma-separated numbers or "all"):

  [1] [Generated summary]
  [2] [Generated decision: Context | Choice | Rationale]
  [3] [Generated context change]
  [4] Other (provide custom content)

  Your selection:
  ```

  d. After user responds, handle modifications if "Other" or changes selected.

  ## Step 4: Planning Status Check (if planning mode active)

  Read current plan.md, todo.md, done.md and compare with actual work.

  **STOP: Present this to user and WAIT for response:**
  ```
  Select all that apply:

  [1] Work deviated from plan
  [2] Plan needs updating
  [3] Everything on track

  Your selection:
  ```

  After user responds, handle:
  - Deviation selected: document in decisions.md
  - Plan needs updating: update plan.md with new direction

  ## Step 5: Update context.md (if context changed)

  CRITICAL: Do this BEFORE the PowerShell script.

  Read current context.md first. Then determine if an update is needed — trigger
  the Edit tool if EITHER condition is true:
  - User validated a context change in Step 3 (scope shift, new capability, etc.), OR
  - The "Current Focus" section still contains the placeholder text
    `[To be filled during conversation]` — this is the first checkpoint and the
    file was never initialized. Always populate it, even if no explicit context
    change was detected.

  When updating, use the Edit tool to replace:
  - "## Current Focus" section with new validated content
  - "## Key Points" bullet list with updated points
  - Use the ACTUAL resolved file path from `active-session.txt` (e.g., `chats/projects/my-project/2026-01-15-my-topic/context.md`)
  - **CRITICAL:** Do NOT pass `$CONTEXT_FILE` or any PowerShell variable as the file path — the Edit tool does not evaluate shell syntax and will fail with "File does not exist"

  Skip only if context.md is already populated AND no context changes were detected.

  ## Step 6: Run PowerShell Script

  IMPORTANT: Each block re-reads `$SESSION_PATH` from `active-session.txt` independently.
  This means blocks are safe to run in separate PowerShell tool calls — no variable state
  is assumed to persist between calls. Always run content appends (Add-Content) before
  timestamp replacements (Set-Content) within each block.

  Before running, replace placeholders:
  - [CHECKPOINT_NUMBER] with count of exchanges in messages.md
  - [WORK_SUMMARY] with the validated summary
  - [OUTCOME] with the outcome description
  - [NUMBER_OF_NEW_DECISIONS] with count of decisions being added
  - [FORMATTED_DECISIONS_CONTENT] with properly formatted decision markdown

  ```powershell
  # --- Block 1: Messages ---
  $SESSION_PATH = (Get-Content ".cli-ai-chat/active-session.txt" -Raw).Trim()
  $CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

  # Content first
  Add-Content -Path "$SESSION_PATH/messages.md" -Value @"

  ### Exchange [CHECKPOINT_NUMBER]
  **User:** [User activities since last checkpoint]
  **Assistant:** [WORK_SUMMARY]
  **Outcome:** [OUTCOME]
  "@

  # Timestamp after — failure here is harmless, content already written
  try {
  	(Get-Content "$SESSION_PATH/messages.md") -replace '\*Last Checkpoint:.*', "*Last Checkpoint: $CURRENT_DATETIME*" | Set-Content "$SESSION_PATH/messages.md"
  } catch {}

  # --- Block 2: Decisions ---
  $SESSION_PATH = (Get-Content ".cli-ai-chat/active-session.txt" -Raw).Trim()
  $CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

  $DECISION_COUNT = if ((Get-Content "$SESSION_PATH/decisions.md" -Raw) -match 'Decision Count: (\d+)') { [int]$matches[1] } else { 0 }
  $NEW_COUNT = $DECISION_COUNT + [NUMBER_OF_NEW_DECISIONS]

  # Content first
  Add-Content -Path "$SESSION_PATH/decisions.md" -Value @"

  [FORMATTED_DECISIONS_CONTENT]
  "@

  # Timestamps after
  try {
  	(Get-Content "$SESSION_PATH/decisions.md") -replace 'Decision Count: \d+', "Decision Count: $NEW_COUNT" | Set-Content "$SESSION_PATH/decisions.md"
  } catch {}
  try {
  	(Get-Content "$SESSION_PATH/decisions.md") -replace '\*Decision Count:.*', "*Decision Count: $NEW_COUNT | Last Updated: $CURRENT_DATETIME*" | Set-Content "$SESSION_PATH/decisions.md"
  } catch {}

  # --- Block 3: Context timestamp ---
  # Content already updated by Edit tool in Step 5 — this is timestamp only
  $SESSION_PATH = (Get-Content ".cli-ai-chat/active-session.txt" -Raw).Trim()
  $CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

  try {
  	(Get-Content "$SESSION_PATH/context.md") -replace '\*Last Updated:.*', "*Last Updated: $CURRENT_DATETIME*" | Set-Content "$SESSION_PATH/context.md"
  } catch {}

  # --- Block 4: Registry ---
  $SESSION_PATH = (Get-Content ".cli-ai-chat/active-session.txt" -Raw).Trim()
  $CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

  try {
  	$registry = Get-Content ".cli-ai-chat/sessions.json" -Raw | ConvertFrom-Json
  	$session = $registry.sessions | Where-Object { $_.path -eq $SESSION_PATH }
  	if ($session) {
  		$session.lastActive = $CURRENT_DATETIME
  		$registry | ConvertTo-Json -Depth 10 | Set-Content ".cli-ai-chat/sessions.json"
  	}
  } catch {
  	Write-Error "Failed to update registry timestamp: $_"
  }

  Write-Host "✓ Checkpoint saved"
  Write-Host "✓ Updated: messages.md, decisions.md, context.md"
  Write-Host "✓ Timestamp: $CURRENT_DATETIME"

  # --- Block 5: Planning mode (if active) ---
  $SESSION_PATH = (Get-Content ".cli-ai-chat/active-session.txt" -Raw).Trim()
  $CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
  $PLANNING_DIR = "$SESSION_PATH/planning-mode"

  $PLAN_FILES = Get-ChildItem "$PLANNING_DIR/*-plan.md" -ErrorAction SilentlyContinue
  if ($PLAN_FILES) {
  	$TODO_FILE = (Get-ChildItem "$PLANNING_DIR/*-todo.md" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
  	$DONE_FILE = (Get-ChildItem "$PLANNING_DIR/*-done.md" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
  	$PENDING_COUNT = if ($TODO_FILE) { (Select-String -Pattern '^\d+\. \[ \]' -Path $TODO_FILE).Matches.Count } else { 0 }
  	$COMPLETED_COUNT = if ($DONE_FILE) { (Select-String -Pattern '^\d+\. \[x\]' -Path $DONE_FILE).Matches.Count } else { 0 }
  	Write-Host ""
  	Write-Host "Planning Mode: Pending=$PENDING_COUNT | Completed=$COMPLETED_COUNT"
  	if ($TODO_FILE) {
  		try { (Get-Content $TODO_FILE) -replace '\*Last Updated:.*', "*Last Updated: $CURRENT_DATETIME*" | Set-Content $TODO_FILE } catch {}
  	}
  	if ($DONE_FILE) {
  		try { (Get-Content $DONE_FILE) -replace '\*Last Updated:.*', "*Last Updated: $CURRENT_DATETIME*" | Set-Content $DONE_FILE } catch {}
  	}
  }
  ```
