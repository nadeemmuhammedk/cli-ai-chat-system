description = "Resume work on an existing session"

prompt = '''
Continue working on a previous session.

**Arguments:** {{args}} (optional - session number)

## Step 1: Read Session Registry

Read `.cli-ai-chat/sessions.json`.
Filter to sessions with status "paused" or "in-progress".
If registry doesn't exist, tell user to run /new-session first.

## Step 2: Display Sessions (if no arguments)

If {{args}} is empty, group sessions by project and number them sequentially:

```
📋 Available Sessions (paused/in-progress only):

Projects:

project-name:
  [1] 2025-01-16-initial-implementation [paused]
  [2] 2025-01-20-feature-additions [paused]

another-project:
  [3] 2025-01-15-meta-generator [paused]

Unnamed Projects:
  [4] 2025-01-17-quick-debugging [paused]

Total: 4 sessions

Enter session number:
```

Wait for user to provide a number.

## Step 3: Match Selection

If {{args}} is a number, match it to the filtered session list (1-indexed).
Validate the session directory exists on disk.

## Step 4: Update Registry and Active Pointer

```powershell
$REGISTRY_FILE = ".cli-ai-chat/sessions.json"
$ACTIVE_FILE = ".cli-ai-chat/active-session.txt"
$TARGET_SESSION = "[selected-session-path]"
$CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

try {
	$registry = Get-Content $REGISTRY_FILE -Raw | ConvertFrom-Json

	# Pause previous active session if different
	$PREV_ACTIVE = Get-Content $ACTIVE_FILE -ErrorAction SilentlyContinue
	if ($PREV_ACTIVE -and $PREV_ACTIVE -ne $TARGET_SESSION) {
		$prevSession = $registry.sessions | Where-Object { $_.path -eq $PREV_ACTIVE }
		if ($prevSession) {
			$prevSession.status = "paused"
			$prevSession.lastActive = $CURRENT_DATETIME
			Write-Host "⚠ Previous session paused: $(Split-Path -Leaf $PREV_ACTIVE)"
		}
	}

	# Mark target as in-progress
	$targetSession = $registry.sessions | Where-Object { $_.path -eq $TARGET_SESSION }
	if ($targetSession) {
		$targetSession.status = "in-progress"
		$targetSession.lastActive = $CURRENT_DATETIME
	} else {
		Write-Error "Session not found: $TARGET_SESSION"
		exit 1
	}

	# Save registry
	$registry | ConvertTo-Json -Depth 10 | Set-Content $REGISTRY_FILE

	# Update active pointer
	$TARGET_SESSION | Set-Content $ACTIVE_FILE
} catch {
	Write-Error "Failed to update registry: $_"
	exit 1
}
```

## Step 5: Display Session Context

Read `[session-path]/context.md` and show it fully under a "Context:" heading.

## Step 6: Check Planning Mode

```powershell
$PLANNING_DIR = "[session-path]/planning-mode"
$PLAN_FILE = Get-ChildItem "$PLANNING_DIR/*-plan.md" -ErrorAction SilentlyContinue | Select-Object -First 1
if ($PLAN_FILE) {
	$PLAN_NAME = (Split-Path -Leaf $PLAN_FILE) -replace '^\d{4}-\d{2}-\d{2}-', '' -replace '-plan\.md$', ''
	$TODO_FILE = Get-ChildItem "$PLANNING_DIR/*-todo.md" -ErrorAction SilentlyContinue | Select-Object -First 1
	$DONE_FILE = Get-ChildItem "$PLANNING_DIR/*-done.md" -ErrorAction SilentlyContinue | Select-Object -First 1
	$TODO_COUNT = if ($TODO_FILE) { (Select-String -Pattern '^\d+\\. \[ \]' -Path $TODO_FILE).Matches.Count } else { 0 }
	$DONE_COUNT = if ($DONE_FILE) { (Select-String -Pattern '^\d+\\. \[x\]' -Path $DONE_FILE).Matches.Count } else { 0 }
	Write-Host "$PLAN_NAME|$TODO_COUNT|$DONE_COUNT"
}
```

If planning active, display:
```
📋 Active Planning Cycle:
  Plan: [plan-name]
  Completed: X tasks
  Remaining: Y tasks

  I will automatically reference the plan and update tasks as we work.
```

## Step 7: Confirm Session Loaded

```
✓ Resumed: [session-topic]
  Path: [full-session-path]
  Status: in-progress
  Project: [project-name]
  Planning Mode: [Active: name] or [Inactive]

You can now use /checkpoint, /start-plan, or /end-session.
```
'''
