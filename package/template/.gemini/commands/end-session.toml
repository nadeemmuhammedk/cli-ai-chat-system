description = "Finalize and close the current session"

prompt = """
End the active session and finalize all documentation.

## Step 1: Read Active Session

Read `.cli-ai-chat/active-session.txt` to get the current session path.
If file doesn't exist, tell the user there is no active session to end.

## Step 2: Check Planning Mode

Look in `[session-path]/planning_mode/` for plan/todo/done files.

## Step 3: Final Checkpoint

a. Analyze the full session:
   - Review entire conversation history
   - Identify all major work completed and artifacts created
   - Collect all decisions made throughout the session

b. Generate a comprehensive session summary.

c. Present numbered selection to user:
```
📋 Final Session Content

Select all that are accurate (comma-separated or "all"):

[1] [Generated full session summary]
[2] [Generated decision 1]
[3] [Generated decision 2]
[4] Other (provide custom content)

Your selection:
```

d. Handle modifications if selected.

## Step 4: Planning Summary (if planning mode was used)

```bash
PLANNING_DIR="[session-path]/planning_mode"
if ls "$PLANNING_DIR"/*-plan.md 2>/dev/null | grep -q .; then
  PLAN_FILE=$(ls "$PLANNING_DIR"/*-plan.md | head -1)
  TODO_FILE=$(ls "$PLANNING_DIR"/*-todo.md 2>/dev/null | head -1)
  DONE_FILE=$(ls "$PLANNING_DIR"/*-done.md 2>/dev/null | head -1)
  TODO_COUNT=$(grep -c "^[0-9]*\\. \\[ \\]" "$TODO_FILE" 2>/dev/null || echo 0)
  DONE_COUNT=$(grep -c "^[0-9]*\\. \\[x\\]" "$DONE_FILE" 2>/dev/null || echo 0)
  TOTAL=$((TODO_COUNT + DONE_COUNT))
  [ $TOTAL -gt 0 ] && PERCENT=$((DONE_COUNT * 100 / TOTAL)) || PERCENT=0
  echo "Planning: $DONE_COUNT/$TOTAL tasks ($PERCENT%)"
fi
```

If incomplete tasks exist, ask:
```
How should incomplete tasks be handled?

[1] Abandoned - Tasks discontinued
[2] Carry Over - Continue in next session
[3] No Longer Relevant

Your selection:
```

## Step 5: Get Final Status

```
What is the final status of this session?

[1] Completed - All work finished
[2] Paused - May resume later
[3] Abandoned - Discontinued

Your selection:
```

## Step 6: Finalize with Bash Script

```bash
SESSION_PATH="[session-path]"
CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
FINAL_STATUS="[completed|paused|abandoned]"
FINAL_SUMMARY="[validated-summary]"
DECISIONS_TO_ADD="[validated-decisions]"

ACTIVE_FILE=".cli-ai-chat/active-session.txt"
REGISTRY_FILE=".cli-ai-chat/sessions.json"
MESSAGES_FILE="$SESSION_PATH/messages.md"
DECISIONS_FILE="$SESSION_PATH/decisions.md"
CONTEXT_FILE="$SESSION_PATH/context.md"

# Append final summary to messages.md
cat >> "$MESSAGES_FILE" <<MESSAGES_EOF

### Final Summary
**User:** Ending session
**Assistant:** $FINAL_SUMMARY
**Outcome:** Session finalized with status: $FINAL_STATUS
MESSAGES_EOF

# Append final decisions (if any)
if [ -n "$DECISIONS_TO_ADD" ]; then
  cat >> "$DECISIONS_FILE" <<DECISIONS_EOF

### Final Session Status ($CURRENT_DATETIME)
$DECISIONS_TO_ADD
DECISIONS_EOF
fi

# Update context.md status
sed -i "/^## Status/,/^##/ {/^## Status/!{/^##/!d}}" "$CONTEXT_FILE" 2>/dev/null
sed -i "/^## Status/a $FINAL_STATUS" "$CONTEXT_FILE"
sed -i "s/\\*Last Updated:.*/\\*Last Updated: $CURRENT_DATETIME*/" "$CONTEXT_FILE"

# Update registry
jq --arg path "$SESSION_PATH" \
   --arg status "$FINAL_STATUS" \
   --arg time "$CURRENT_DATETIME" \
   '.sessions |= map(if .path == $path then .status = $status | .lastActive = $time else . end)' \
   "$REGISTRY_FILE" > "$REGISTRY_FILE.tmp" && mv "$REGISTRY_FILE.tmp" "$REGISTRY_FILE"

# Clear active pointer
rm -f "$ACTIVE_FILE"

# Display summary
SESSION_TOPIC=$(basename "$SESSION_PATH" | sed 's/^[0-9]\\{4\\}-[0-9]\\{2\\}-[0-9]\\{2\\}-//')
PROJECT_NAME=$(jq -r --arg path "$SESSION_PATH" '.sessions[] | select(.path == $path) | .project' "$REGISTRY_FILE")

echo ""
echo "✓ Session finalized: $FINAL_STATUS"
echo "  Project: $PROJECT_NAME"
echo "  Topic: $SESSION_TOPIC"
echo "  Finalized: $CURRENT_DATETIME"
echo "✓ Active session pointer cleared"
```
"""
