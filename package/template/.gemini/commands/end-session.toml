description = "Finalize and close the current session"

prompt = '''
End the active session and finalize all documentation.

## Step 1: Read Active Session

Read `.cli-ai-chat/active-session.txt` to get the current session path.
If file doesn't exist, tell the user there is no active session to end.

## Step 2: Check Planning Mode

Look in `[session-path]/planning-mode/` for plan/todo/done files.

## Step 3: Final Checkpoint

a. Analyze the full session:
   - Review entire conversation history
   - Identify all major work completed and artifacts created
   - Collect all decisions made throughout the session

b. Generate a comprehensive session summary.

c. Present numbered selection to user:
```
📋 Final Session Content

Select all that are accurate (comma-separated or "all"):

[1] [Generated full session summary]
[2] [Generated decision 1]
[3] [Generated decision 2]
[4] Other (provide custom content)

Your selection:
```

d. Handle modifications if selected.

## Step 4: Planning Summary (if planning mode was used)

```powershell
$PLANNING_DIR = "[session-path]/planning-mode"
$PLAN_FILES = Get-ChildItem "$PLANNING_DIR/*-plan.md" -ErrorAction SilentlyContinue
if ($PLAN_FILES) {
	$PLAN_FILE = $PLAN_FILES[0]
	$TODO_FILE = Get-ChildItem "$PLANNING_DIR/*-todo.md" -ErrorAction SilentlyContinue | Select-Object -First 1
	$DONE_FILE = Get-ChildItem "$PLANNING_DIR/*-done.md" -ErrorAction SilentlyContinue | Select-Object -First 1
	$TODO_COUNT = if ($TODO_FILE) { (Select-String -Pattern '^\d+\\. \[ \]' -Path $TODO_FILE).Matches.Count } else { 0 }
	$DONE_COUNT = if ($DONE_FILE) { (Select-String -Pattern '^\d+\\. \[x\]' -Path $DONE_FILE).Matches.Count } else { 0 }
	$TOTAL = $TODO_COUNT + $DONE_COUNT
	$PERCENT = if ($TOTAL -gt 0) { [math]::Round($DONE_COUNT * 100 / $TOTAL) } else { 0 }
	Write-Host "Planning: $DONE_COUNT/$TOTAL tasks ($PERCENT%)"
}
```

If incomplete tasks exist, ask:
```
How should incomplete tasks be handled?

[1] Abandoned - Tasks discontinued
[2] Carry Over - Continue in next session
[3] No Longer Relevant

Your selection:
```

## Step 5: Get Final Status

```
What is the final status of this session?

[1] Completed - All work finished
[2] Paused - May resume later
[3] Abandoned - Discontinued

Your selection:
```

## Step 6: Update context.md Content

CRITICAL: Complete this step BEFORE running the PowerShell script in Step 7.

Read current context.md to see the existing "Current Focus", "Session Focus", and "Key Points" sections.

**Current Focus** — replace entire paragraph:
- Generate one sentence describing the final state of work at session close
- Use Edit tool to replace the entire "## Current Focus" paragraph
- Use the ACTUAL resolved file path from active-session.txt
- Do NOT use $CONTEXT_FILE or any shell variable as the file path — the Edit tool does not evaluate shell syntax

**Session Focus** — surgical merge:
- Read the existing Session Focus text and merge in the session's final outcomes surgically:
  - Add what the session ultimately produced or achieved
  - Update any parts that were still provisional/in-progress but are now resolved
  - Remove anything that turned out not to be relevant
  - Only do a full replacement if the session took a completely different direction than when it started
- Apply using Edit tool with targeted in-place edits

**Key Points** — surgical merge:
- Read the existing Key Points bullet list
- For each new point from the final session window, check against existing bullets:
  - Overlaps with an existing bullet → update that bullet in-place
  - Genuinely new → append as a new bullet at the end of the list
- For each existing bullet, assess against the full session:
  - Still accurate → keep unchanged
  - Outdated or contradicted → update in-place or remove
- Apply using Edit tool — targeted replacements per bullet, not full-section replacement

Do NOT update timestamp or status yet (PowerShell script handles those).

## Step 7: Finalize with PowerShell Script

```powershell
$SESSION_PATH = "[session-path]"
$CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
$FINAL_STATUS = "[completed|paused|abandoned]"
$FINAL_SUMMARY = "[validated-summary]"
$DECISIONS_TO_ADD = "[validated-decisions]"

$ACTIVE_FILE = ".cli-ai-chat/active-session.txt"
$REGISTRY_FILE = ".cli-ai-chat/sessions.json"
$MESSAGES_FILE = "$SESSION_PATH/messages.md"
$DECISIONS_FILE = "$SESSION_PATH/decisions.md"
$CONTEXT_FILE = "$SESSION_PATH/context.md"

# Append final exchange to messages.md
$EXCHANGE_COUNT = (Select-String -Pattern "^### Exchange" -Path $MESSAGES_FILE -ErrorAction SilentlyContinue).Count
if (-not $EXCHANGE_COUNT) { $EXCHANGE_COUNT = 0 }
$NEXT_EXCHANGE_NUMBER = $EXCHANGE_COUNT + 1
Add-Content -Path $MESSAGES_FILE -Value @"

### Exchange $NEXT_EXCHANGE_NUMBER
**User:** Ending session
**Assistant:** $FINAL_SUMMARY
**Outcome:** Session finalized with status: $FINAL_STATUS
"@

# Append final decisions (if any)
if ($DECISIONS_TO_ADD) {
	Add-Content -Path $DECISIONS_FILE -Value @"

### Final Session Status ($CURRENT_DATETIME)
$DECISIONS_TO_ADD
"@
}

# Update context.md status
$contextLines = Get-Content $CONTEXT_FILE
$newLines = @()
$skip = $false
for ($i = 0; $i -lt $contextLines.Count; $i++) {
	$line = $contextLines[$i]
	if ($line -match '^## Status') {
		$newLines += $line
		$newLines += $FINAL_STATUS
		$skip = $true
		continue
	}
	if ($skip -and $line -match '^##') {
		$skip = $false
	}
	if (-not $skip) {
		$newLines += $line
	}
}
$newLines -replace '\*Last Updated:.*', "*Last Updated: $CURRENT_DATETIME*" | Set-Content $CONTEXT_FILE

# Update registry
try {
	$registry = Get-Content $REGISTRY_FILE -Raw | ConvertFrom-Json
	$session = $registry.sessions | Where-Object { $_.path -eq $SESSION_PATH }
	if ($session) {
		$session.status = $FINAL_STATUS
		$session.lastActive = $CURRENT_DATETIME
		$registry | ConvertTo-Json -Depth 10 | Set-Content $REGISTRY_FILE
	} else {
		Write-Error "Session not found: $SESSION_PATH"
		exit 1
	}
} catch {
	Write-Error "Failed to update registry: $_"
	exit 1
}

# Clear active pointer
Remove-Item $ACTIVE_FILE -Force -ErrorAction SilentlyContinue

# Display summary
$SESSION_TOPIC = (Split-Path -Leaf $SESSION_PATH) -replace '^\d{4}-\d{2}-\d{2}-', ''
$PROJECT_NAME = ($registry.sessions | Where-Object { $_.path -eq $SESSION_PATH }).project

Write-Host ""
Write-Host "✓ Session finalized: $FINAL_STATUS"
Write-Host "  Project: $PROJECT_NAME"
Write-Host "  Topic: $SESSION_TOPIC"
Write-Host "  Finalized: $CURRENT_DATETIME"
Write-Host "✓ Active session pointer cleared"
```
'''
