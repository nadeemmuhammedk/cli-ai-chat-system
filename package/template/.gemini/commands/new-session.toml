description = "Create a new AI chat session with organized folder structure"

prompt = '''
Create a new session folder for organizing this AI chat conversation.

**Arguments:** {{args}}

## Step 0: Validate Prerequisites

Run the following PowerShell check:
```powershell
if (!(Test-Path "_templates/session/context-template.md") -or
	!(Test-Path "_templates/session/messages-template.md") -or
	!(Test-Path "_templates/session/decisions-template.md")) {
	Write-Error "ERROR: Template files missing in _templates/session/"
	exit 1
}
Write-Host "Prerequisites OK"
```
If validation fails, stop and display the error.

## Step 1: Parse Arguments

Parse {{args}}:
- 2+ words: First word = project name, rest = session topic
- 1 word: Ask "Is this a project name or session topic?"
- 0 words: Ask for both project (optional) and topic

Validation - both names must be kebab-case: `^[a-z0-9]+(-[a-z0-9]+)*$`

If invalid, display:
```
Error: Names must use kebab-case (lowercase, hyphens, numbers only).
Examples: seo-research, bug-fix-123, testing
```

## Step 2: Check Session Doesn't Already Exist

```powershell
$SESSION_PATH = "chats/projects/[project]/[YYYY-MM-DD]-[topic]"
if (Test-Path $SESSION_PATH) { echo "EXISTS" } else { echo "NOT_EXISTS" }
```

If EXISTS, tell user to choose a different topic or use /continue-session.

## Step 3: Create Session Structure

Execute a single PowerShell script with all values substituted:

```powershell
$PROJECT_NAME = "[project-name]"
$PROJECT_DISPLAY = "[project-display]"
$SESSION_TOPIC = "[session-topic]"
$CURRENT_DATE = "[YYYY-MM-DD]"
$CURRENT_DATETIME = "[ISO-8601-timestamp]"

if ($PROJECT_NAME) {
	$SESSION_PATH = "chats/projects/$PROJECT_NAME/$CURRENT_DATE-$SESSION_TOPIC"
} else {
	$SESSION_PATH = "chats/unnamed_projects/$CURRENT_DATE-$SESSION_TOPIC"
}

$TEMPLATE_DIR = "_templates/session"
$REGISTRY_FILE = ".cli-ai-chat/sessions.json"
$ACTIVE_FILE = ".cli-ai-chat/active-session.txt"

# Create folder structure
$dirs = "artifacts", "core-files", "core-instructions", "uploaded-files", "planning-mode/archive"
foreach ($dir in $dirs) {
	New-Item -ItemType Directory -Force -Path "$SESSION_PATH/$dir" | Out-Null
}

function Copy-AndReplace($src, $dest) {
	Copy-Item $src $dest
	(Get-Content $dest) `
		-replace '\[SESSION_TOPIC\]', $SESSION_TOPIC `
		-replace '\[PROJECT_NAME\]', $PROJECT_DISPLAY `
		-replace '\[CURRENT_DATETIME\]', $CURRENT_DATETIME `
		-replace '\[DATETIME\]', $CURRENT_DATETIME | Set-Content $dest
}

Copy-AndReplace "$TEMPLATE_DIR/context-template.md" "$SESSION_PATH/context.md"
Copy-AndReplace "$TEMPLATE_DIR/messages-template.md" "$SESSION_PATH/messages.md"
Copy-AndReplace "$TEMPLATE_DIR/decisions-template.md" "$SESSION_PATH/decisions.md"

# Initialize registry if needed
if (!(Test-Path ".cli-ai-chat")) { New-Item -ItemType Directory ".cli-ai-chat" | Out-Null }
if (!(Test-Path $REGISTRY_FILE)) { '{"sessions": []}' | Set-Content $REGISTRY_FILE }

# Load registry
try {
	$registry = Get-Content $REGISTRY_FILE -Raw | ConvertFrom-Json
} catch {
	Write-Error "Failed to read registry: $_"
	exit 1
}

# Pause previous active session if exists
if (Test-Path $ACTIVE_FILE) {
	$PREV_ACTIVE = Get-Content $ACTIVE_FILE
	if ($PREV_ACTIVE) {
		$prevSession = $registry.sessions | Where-Object { $_.path -eq $PREV_ACTIVE }
		if ($prevSession) {
			$prevSession.status = "paused"
			$prevSession.lastActive = $CURRENT_DATETIME
			Write-Host "Previous session paused: $PREV_ACTIVE"
		}
	}
}

# Add new session to registry
$newSession = [PSCustomObject]@{
	path = $SESSION_PATH
	topic = $SESSION_TOPIC
	project = $PROJECT_DISPLAY
	status = "in-progress"
	platform = "gemini"
	created = $CURRENT_DATETIME
	lastActive = $CURRENT_DATETIME
}
$registry.sessions += $newSession

# Save registry
try {
	$registry | ConvertTo-Json -Depth 10 | Set-Content $REGISTRY_FILE
} catch {
	Write-Error "Failed to save registry: $_"
	exit 1
}

# Set active pointer
$SESSION_PATH | Set-Content $ACTIVE_FILE

Write-Host "✓ Session created: $SESSION_PATH"
Write-Host "✓ Registry updated"
```

## Step 4: Confirm Success

Display:
```
✓ Session created successfully!

Location: [session-path]
Project: [project or "Unnamed"]
Status: Active

You can now:
  - Use /checkpoint to save progress
  - Use /start-plan for complex multi-phase work
  - Use /end-session when complete
```
'''
