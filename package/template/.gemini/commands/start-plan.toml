description = "Initiate planning mode for complex, multi-phase work"

prompt = '''
Start a new planning cycle in the current active session.

**Plan name:** {{args}}

## Step 1: Validate Active Session

```powershell
$ACTIVE_FILE = ".cli-ai-chat/active-session.txt"
if (!(Test-Path $ACTIVE_FILE -PathType Leaf)) {
	Write-Error "ERROR: No active session found"
	Write-Host "Run /new-session or /continue-session first"
	exit 1
}
$SESSION_PATH = Get-Content $ACTIVE_FILE
if (!(Test-Path $SESSION_PATH -PathType Container)) {
	Write-Error "ERROR: Session directory not found: $SESSION_PATH"
	exit 1
}
Write-Host "Active session: $SESSION_PATH"
```

## Step 2: Validate Plan Name

If {{args}} is empty, ask the user for a descriptive kebab-case plan name (e.g., "api-refactoring", "feature-implementation").

## Step 3: Archive Existing Planning Files (if any)

```powershell
$PLANNING_DIR = "$SESSION_PATH/planning-mode"
$TIMESTAMP = (Get-Date).ToString("yyyy-MM-dd-HHmm")
New-Item -ItemType Directory -Force -Path $PLANNING_DIR | Out-Null

$EXISTING_FILES = Get-ChildItem "$PLANNING_DIR/*.md" -ErrorAction SilentlyContinue | Where-Object { $_.Directory.Name -ne "archive" }
if ($EXISTING_FILES) {
	New-Item -ItemType Directory -Force -Path "$PLANNING_DIR/archive" | Out-Null
	foreach ($file in $EXISTING_FILES) {
		if (Test-Path $file -PathType Leaf) {
			$archived_name = "archived-$TIMESTAMP-$(Split-Path -Leaf $file)"
			Move-Item $file "$PLANNING_DIR/archive/$archived_name"
			Write-Host "Archived: $(Split-Path -Leaf $file) → $archived_name"
		}
	}
	Write-Host "Old planning cycle archived"
}
```

## Step 4: Create Planning Files

```powershell
$PLAN_NAME = "[validated-plan-name]"
$CURRENT_DATE = (Get-Date).ToString("yyyy-MM-dd")
$CURRENT_DATETIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
$PLANNING_DIR = "$SESSION_PATH/planning-mode"

# plan.md
$PLAN_FILE = "$PLANNING_DIR/$CURRENT_DATE-$PLAN_NAME-plan.md"
$planContent = @"
# Planning Document: $PLAN_NAME

## Created
$CURRENT_DATETIME

## Overview
[Brief description of what this planning cycle aims to accomplish]

## Goals
1. [Primary goal]
2. [Secondary goal]

## Approach
[High-level methodology and strategy]

## Phases

### Phase 1: [Phase Name]
**Objective:** [What this phase accomplishes]
**Tasks:** See todo.md
**Dependencies:** [What must be done first, or "None"]
**Success Criteria:** [How we know this phase is complete]

### Phase 2: [Phase Name]
**Objective:**
**Tasks:** See todo.md
**Dependencies:**
**Success Criteria:**

## Constraints
- [Technical constraints]
- [Resource constraints]

## Risks
- [Risk 1]: [Mitigation]
- [Risk 2]: [Mitigation]

## Notes
[Additional context or assumptions]

---
*Last Updated: $CURRENT_DATETIME*
"@
Set-Content -Path $PLAN_FILE -Value $planContent

# todo.md
$TODO_FILE = "$PLANNING_DIR/$CURRENT_DATE-$PLAN_NAME-todo.md"
$todoContent = @"
# Task List: $PLAN_NAME

## Created
$CURRENT_DATETIME

## Phase 1: [Phase Name]
1. [ ] Task description
2. [ ] Task description

## Phase 2: [Phase Name]
3. [ ] Task description
4. [ ] Task description

---
*Last Updated: $CURRENT_DATETIME*
*Tasks Remaining: [Count unchecked items]*
"@
Set-Content -Path $TODO_FILE -Value $todoContent

# done.md
$DONE_FILE = "$PLANNING_DIR/$CURRENT_DATE-$PLAN_NAME-done.md"
$doneContent = @"
# Completed Tasks: $PLAN_NAME

## Created
$CURRENT_DATETIME

## Completions

(Tasks will be added here as they are completed from todo.md)

---
*Last Updated: $CURRENT_DATETIME*
*Total Completed: 0*
"@
Set-Content -Path $DONE_FILE -Value $doneContent

Write-Host "✓ Planning mode activated: $PLAN_NAME"
Write-Host "Files: plan.md, todo.md, done.md"
```

## Step 5: Confirm and Explain Behaviors

Display:
```
✓ Planning mode activated: [plan-name]

Files created in planning-mode/:
  - [date]-[name]-plan.md
  - [date]-[name]-todo.md
  - [date]-[name]-done.md

Next steps:
  1. Fill in plan.md with goals, approach, and phases
  2. Break down tasks in todo.md by phase
  3. I will automatically:
     - Reference plan.md before major work
     - Update todo.md as tasks progress
     - Move completed tasks to done.md
     - Alert you if work deviates from the plan
```
'''
